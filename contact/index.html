<!DOCTYPE HTML>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Onur Kaan</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css"
        integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css"
        integrity="sha512-KfkfwYDsLkIlwQp6LFnl8zNdLGxu9YAA1QvwINks4PhcElQSvqcyVLLD9aMhXd13uQjoXtEKNosOWaZqXgel0g=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="icon" type="image/x-icon" href="/images/favicon.ico">
</head>

<body>

    <div class="toggle" id="toggle">
        <i class="fa fa-bars active" id="fa-bars"></i>
        <i class="fa fa-times" id="fa-times"></i>
    </div>
    <nav class="header-main" id="header-main">
        <div class="icons">
            <ul>
                <li><a><img src="/images/logo.png" class="logo"></a></li>
                <hr size="7" color="#000">
                <li data-bs-toggle="tooltip" data-position="top" data-bs-trigger="hover" title="Home">
                    <a href="/" id="home-icon"><i class="fa fa-home"></i></a>
                </li>
                <li data-bs-toggle="tooltip" data-position="top" data-bs-trigger="hover" title="About">
                    <a href="/about/" id="about-icon"><i class="fa fa-user-tie"></i></a>
                </li>
                <li data-bs-toggle="tooltip" data-position="top" data-bs-trigger="hover" title="Portfolio">
                    <a href="/portfolio/" id="portfolio-icon"><i class="fa fa-briefcase"></i></a>
                </li>
                <li data-bs-toggle="tooltip" data-position="top" data-bs-trigger="hover" title="Contact">
                    <a href="/contact/" id="contact-icon"><i class="fa fa-envelope active-icon"></i></a>
                </li>
            </ul>
        </div>
    </nav>

    <section class="body">
        <div class="contact">

            <div class="contact-header">
                <h2>Contact Me</h2>
            </div>

            <div class="contact-cards">

                <div class="contact-card">
                    <div class="card-icon">
                        <span><i class="fa-solid fa-paper-plane"></i></span>
                    </div>
                    <div class="card-title">Send Me Email</div>
                    <div class="card-content"><a href="mailto:onurkaan001@outlook.com">onurkaan001@outlook.com</a></div>
                </div>
                
            </div>
            
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/typed.js@2.0.12"></script>
    <script src="/app.js"></script>

</body>

</html>
